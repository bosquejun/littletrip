version: "3.8"

services:
  postgres:
    image: postgres:16.2-alpine
    environment:
      POSTGRES_DB: littletrip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: ${REGISTRY}/little-trip-api:${VERSION:-latest}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/littletrip
      SPRING_DATASOURCE_USERNAME: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    secrets:
      - db_password
      - api_key
    ports:
      - "8081:8081"
    networks:
      - app-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M

  web:
    image: ${REGISTRY}/little-trip-web:${VERSION:-latest}
    environment:
      API_URL: http://api:8081
    secrets:
      - api_key
      - admin_username
      - admin_password
    ports:
      - "3000:3000"
    networks:
      - app-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

networks:
  app-network:
    driver: overlay

volumes:
  postgres_data:
  redis_data:

secrets:
  db_password:
    external: true
  api_key:
    external: true
  admin_username:
    external: true
  admin_password:
    external: true
